# ─── FORMULAS ────────────────────────────────────────────────────────────────

formulas:
  - name: noise_at_target
    status: active
    source: design/gdd/noise-system.md
    referenced_by:
      - design/gdd/noise-system.md
      - design/gdd/sonar-system.md
      - design/gdd/chase-system.md
    variables:
      - action_noise
      - tile_multiplier
      - path_attenuation
      - wall_attenuation
      - wall_count
    output_range: [0, 999]
    expression: "action_noise × tile_multiplier × path_attenuation"
    notes: "path_attenuation = Π(1 - tile.absorbs_sound) × wall_attenuation^wall_count"
    added: 2026-05-16
    revised: ""

  - name: sonar_tier
    status: active
    source: design/gdd/sonar-system.md
    referenced_by:
      - design/gdd/sonar-system.md
      - design/gdd/equipment-system.md
      - design/gdd/fear-corruption-system.md
    variables:
      - sonar_range
      - distance_to_target
      - resonator_bonus
      - amplifier_bonus
      - fear_penalty
      - corruption_penalty
      - anechoic_penalty
    output_range: [0, 5]
    expression: "clamp(floor((sonar_range - distance) / sonar_range × 5) + bonuses - penalties, 0, 5)"
    added: 2026-05-16
    revised: ""

  - name: sight_radius
    status: active
    source: design/gdd/vision-system.md
    referenced_by:
      - design/gdd/vision-system.md
      - design/gdd/fear-corruption-system.md
    variables:
      - base_radius
      - light_bonus
      - fear_penalty
      - darkness_penalty
    output_range: [2, 9]
    expression: "max(cursed_dark_cap, base_radius + light_bonus - fear_penalty - darkness_penalty)"
    notes: "cursed_dark_cap = 2 and overrides all other modifiers when active"
    added: 2026-05-16
    revised: ""


